name: Trivy scan and Update Trivy cache

on:
  schedule:
    - cron: '42 1 * * *'  # Run daily at 1:42 AM UTC
  workflow_dispatch:  # Allow manual triggering

permissions:
  contents: write
  security-events: write

jobs:
  update-trivy-db:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          ref: ${{ github.sha }}
          fetch-depth: 1
          
      - name: Setup oras
        uses: oras-project/setup-oras@v1

      - name: Get week key
        id: week_key
        run: echo "week_key=$(date +'%G-W%V')" >> $GITHUB_OUTPUT

      - name: Restore Trivy Cache
        uses: actions/cache@v6
        with:
          path: ${{ github.workspace }}/.cache/trivy
          key: cache-trivy-${{ steps.week_key.outputs.week_key }}
          restore-keys: |
            cache-trivy-

      - name: Run Trivy in GitHub SBOM mode and submit results to Dependency Graph
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: fs
          format: github
          output: dependency-results.sbom.json
          scan-ref: .
          severity: LOW,MEDIUM,HIGH,CRITICAL
          github-pat: ${{ secrets.GITHUB_TOKEN }}
          exit-code: 0
          version: latest
          cache: 'false'
        env:
          TRIVY_CACHE_DIR: ${{ github.workspace }}/.cache/trivy
      
      - name: Upload Trivy Scan Results
        uses: actions/upload-artifact@v7
        with:
          retention-days: 7
          name: trivy-reports
          path: |
            dependency-results.sbom.json

      - name: Scan with Trivy about FileSystem
        uses: aquasecurity/trivy-action@master
        with:
          trivy-config: trivy.yaml
          scan-type: fs
          scan-ref: .
          version: latest
          cache: 'false'
        env:
          TRIVY_CACHE_DIR: ${{ github.workspace }}/.cache/trivy