name: Shared Build and Scan Pipeline

on:
  workflow_call:
    inputs:
      checkout_ref:
        description: Commit/branch/tag to checkout for all jobs
        required: true
        type: string
      flutter_version:
        description: Flutter version used by build and test jobs
        required: true
        type: string
      image_name:
        description: Full image name without tag (GHCR)
        required: true
        type: string
      release_tag:
        description: Docker tag used for image scan and release metadata
        required: true
        type: string
      docs_pdf_version:
        description: Version suffix used to rename generated docs PDF
        required: true
        type: string
      docker_metadata_tags:
        description: Multiline Docker metadata tags configuration
        required: true
        type: string
      enable_pr_analyze_comment:
        description: Enable Flutter analyze PR comment publication
        required: false
        type: boolean
        default: false
    outputs:
      image_digest:
        description: Docker image digest from build-push action
        value: ${{ jobs.build-docker-web.outputs.image_digest }}

jobs:
  semgrep:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    container:
      image: semgrep/semgrep

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.checkout_ref }}
          fetch-depth: 1

      - name: Run Semgrep full output without quality gate
        run: semgrep scan --config=auto --config=p/owasp-top-ten  --config=p/cwe-top-25  --config=p/security-audit --config=p/trailofbits --json-output=semgrep.result.json
        continue-on-error: true # we want to report all issues first, then apply quality gate in a separate step

      - name: Upload Semgrep Scan Results
        uses: actions/upload-artifact@v4
        with:
          retention-days: 7
          name: semgrep-reports
          path: |
            semgrep.result.json

      - name: Run Semgrep with quality gate
        run: semgrep ci --config=auto --config=p/owasp-top-ten --config=p/cwe-top-25 --config=p/security-audit --config=p/trailofbits

  test:
    needs: semgrep
    runs-on: windows-latest # tests are executed on Windows to share cache with Windows build job and speed up overall workflow execution
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.checkout_ref }}
          fetch-depth: 1

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ inputs.flutter_version }}
          channel: stable
          cache: true

      - name: Install dependencies
        working-directory: belotable
        run: flutter pub get

      - name: Analyze code
        id: flutter_analyze
        working-directory: belotable
        shell: pwsh
        run: |
          flutter analyze --no-fatal-infos | Tee-Object -FilePath flutter_analyze_report.log
          echo "exit_code=$LASTEXITCODE" >> $env:GITHUB_OUTPUT
        continue-on-error: true

      - name: Annotate code with analyzer results
        shell: pwsh
        if: steps.flutter_analyze.conclusion != 'skipped'
        working-directory: belotable
        run: |
          Get-Content flutter_analyze_report.log | ForEach-Object {
            if ($_ -match '^\s*(?<severity>\w+) - (?<message>.+) - (?<file>.+):(?<line>\d+):(?<col>\d+) - (?<rule>.+)$') {
              $severity = $matches['severity']
              $message = $matches['message']
              $file = $matches['file']
              # normalize file path
              $file = $file -replace '\\', '/'
              $file = "belotable/$file"
              $line = $matches['line']
              $col = $matches['col']
              $rule = $matches['rule']
              $fullMessage = "$message ($rule) [severity=$severity]"

              switch ($severity) {
                "error" {
                  Write-Output "::error file=$file,line=$line,col=$col::$fullMessage"
                }
                "warning" {
                  Write-Output "::warning file=$file,line=$line,col=$col::$fullMessage"
                }
                default {
                  Write-Output "::notice file=$file,line=$line,col=$col::$fullMessage"
                }
              }
            }
          }

      - name: Comment PR with analyzer results
        if: ${{ inputs.enable_pr_analyze_comment && steps.flutter_analyze.conclusion != 'skipped' && github.event_name == 'pull_request' }}
        uses: actions/github-script@v7
        with:
          script: |
            // read and parse the analyzer report to extract issues
            const fs = require('fs');
            const content = fs.readFileSync('belotable/flutter_analyze_report.log', 'utf8');
            const lines = content.split('\n');
            const issues = [];
            const regex = /^\s*(\w+)\s+-\s+(.+?)\s+-\s+(.+?):(\d+):(\d+)\s+-\s+(.+)$/;
            for (const line of lines) {
              const cleaned = line.replace(/\r/g, '').trim();
              const match = cleaned.match(regex);
              if (!match) continue;
              const severity = match[1];
              const message = match[2];
              const file = `belotable/${match[3].replace(/\\/g, '/')}`;
              const lineNum = parseInt(match[4], 10);
              const rule = match[6];
              issues.push({ severity, message, file, line: lineNum, rule });
            }
            // sort issues by file and line number
            issues.sort((a, b) => {
              if (a.file === b.file) return a.line - b.line;
              return a.file.localeCompare(b.file);
            });
            // group issues by file
            const grouped = {};
            for (const issue of issues) {
              if (!grouped[issue.file]) {
                grouped[issue.file] = [];
              }
              grouped[issue.file].push(issue);
            }

            // prepare comment body with markdown formatting
            const severityIcon = {
              error: '🔴',
              warning: '🟡',
              info: '🟢',
            };
            const header = "## Flutter Analyze Report";
            let body = `${header}\n\n`;
            body += `This comment has been updated with latest results.\n\n`;
            body += `This report concerns all files in the \`belotable\` directory, not only the files changed in this PR.\n\n`;
            body += `---\n`;
            // summary of issues by severity
            const total = issues.length;
            const errors = issues.filter(i => i.severity === 'error').length;
            const warnings = issues.filter(i => i.severity === 'warning').length;
            const infos = issues.filter(i => i.severity === 'info').length;
            const unknown = issues.filter(i => i.severity !== 'error' && i.severity !== 'warning' && i.severity !== 'info').length;
            body += `### Total: ${total} issues\n\n`;
            body += `| Severity | Count |\n`;
            body += `|----------|-------|\n`;
            body += `| 🔴 Errors | ${errors} |\n`;
            body += `| 🟡 Warnings | ${warnings} |\n`;
            body += `| 🟢 Info | ${infos} |\n`;
            body += `| ⚪ Unknown severity | ${unknown} |\n`;
            body += `\n`;
            body += `---\n`;
            // detailed table of issues grouped by file
            for (const file of Object.keys(grouped)) {
              body += `### ${file}\n`;
              body += `| Line | Severity | Rule | Message |\n`;
              body += `|------|--------|------|--------|\n`;
              for (const issue of grouped[file]) {
                const icon = severityIcon[issue.severity] || '⚪';
                body += `| ${issue.line} | ${icon} ${issue.severity} | ${issue.rule} | ${issue.message} |\n`;
              }
              body += `\n`;
            }
            // check if a comment with the same header already exists, if so update it, otherwise create a new one
            const comments = await github.rest.issues.listComments({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo
            });
            const existing = comments.data.find(c =>
              c.body.includes(header)
            );
            if (existing) {
              await github.rest.issues.updateComment({
                comment_id: existing.id,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: body
              });
            } else {
              await github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: body
              });
            }

      - name: Quality gate
        if: always() && steps.flutter_analyze.outputs.exit_code != '0'
        shell: pwsh
        run: |
          Write-Error "Flutter analyze failed (quality gate)"
          exit 1

      - name: Run tests
        working-directory: belotable
        run: flutter test --coverage -r github --file-reporter json:tests-report.json
        timeout-minutes: 12

      - name: Publish Test Results
        uses: EnricoMi/publish-unit-test-result-action/windows@v2
        if: (!cancelled())
        with:
          files: |
            belotable/tests-report.json

      - name: Publish test coverage to workflow summary
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const coveragePath = 'belotable/coverage/lcov.info';
            let coverageText = '❌ Coverage report not generated';

            if (fs.existsSync(coveragePath)) {
              const lines = fs.readFileSync(coveragePath, 'utf8').split('\n');
              const lineHit = Number(lines.find(l => l.startsWith('LH:'))?.split(':')[1] ?? 0);
              const lineFound = Number(lines.find(l => l.startsWith('LF:'))?.split(':')[1] ?? 0);
              if (lineFound > 0) {
                const pct = ((lineHit / lineFound) * 100).toFixed(2);
                coverageText = `✅ Coverage: ${pct}% (${lineHit}/${lineFound} lines)`;
              }
            }

            await core.summary
              .addHeading('Test Coverage')
              .addRaw(coverageText, true)
              .write();

      - name: Init integration_test - Enable Windows support
        working-directory: belotable
        run: flutter config --enable-windows-desktop
      
      - name: Clean integration_test screenshots directory
        # we need to clean screenshots directory before running tests to be sure that any screenshot found after tests execution is related to the current test run and not a leftover from a previous run
        working-directory: belotable
        run: Remove-Item -Path 'integration_test/screenshots_failures/*' -ErrorAction SilentlyContinue

      - name: Run integration tests (Windows)
        id: integration_tests_execution
        working-directory: belotable
        run: flutter test integration_test/all_tests.dart -d windows -r expanded | tee integration_test_output.txt
     
      - name: Upload screenshots of failed integration tests
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-screenshots-failures
          path: |
            **/integration_test/screenshots_failures/*.png
      
      - name: Comment PR with integration test results and screenshots
        if: always() && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const output = fs.readFileSync('belotable/integration_test_output.txt', 'utf8');
            const screenshotsPath = 'belotable/integration_test/screenshots_failures';
            let hasScreenshots = false;
            if (fs.existsSync(screenshotsPath)) {
              const files = fs.readdirSync(screenshotsPath);
              hasScreenshots = files.length > 0;
            }
            const runUrl = `https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const testStatus = "${{ steps.integration_tests_execution.outcome }}";
            
            const header = "## Integration tests report";
            let body = `${header}\n\n`;
            let statusIcon = "✅ SUCCESS";
            if (testStatus !== "success") {
              statusIcon = "❌ FAILURE";
            }
            body += `Tests execution status: ${statusIcon}\n\n`;
            if (hasScreenshots) {
              body += `Screenshots are available as 'e2e-screenshots-failures' in artifacts of ${runUrl}\n`;
            }
            body += `---\n`;
            body += `### Tests output\n\n`;
            body += '```\n' + output + '\n```\n';
            body += `\n`;
            body += `---\n`;
            body += `\n`;
            body += `This comment has been updated with latest results.\n\n`;

            // check if a comment with the same header already exists, if so update it, otherwise create a new one
            const comments = await github.rest.issues.listComments({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo
            });
            const existing = comments.data.find(c =>
              c.body.includes(header)
            );
            if (existing) {
              await github.rest.issues.updateComment({
                comment_id: existing.id,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: body
              });
            } else {
              await github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: body
              });
            }

  build-docker-web:
    needs: test
    runs-on: ubuntu-latest
    outputs:
      image_digest: ${{ steps.docker_build.outputs.digest }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.checkout_ref }}
          fetch-depth: 1

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ inputs.image_name }}
          tags: ${{ inputs.docker_metadata_tags }}

      - name: Build and push
        id: docker_build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: build/docker/Dockerfile
          build-args: |
            FLUTTER_VERSION=${{ inputs.flutter_version }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-windows-installer:
    needs: test
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.checkout_ref }}
          fetch-depth: 1

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ inputs.flutter_version }}
          channel: stable
          cache: true

      - name: Install dependencies
        working-directory: belotable
        run: flutter pub get

      - name: Build Windows release
        working-directory: belotable
        run: flutter build windows --release

      - name: Install Inno Setup
        run: choco install innosetup --no-progress -y

      - name: Build installer (Inno Setup)
        shell: pwsh
        run: ./build/windows-build-innosetup.ps1 -OutputDir "$env:GITHUB_WORKSPACE/artifacts/windows"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: artifacts/windows/*
          if-no-files-found: error
          retention-days: 7

  build-docs-pdf:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.checkout_ref }}
          fetch-depth: 1

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install MkDocs dependencies
        run: |
          python -m pip install --upgrade pip
          pip install mkdocs mkdocs-material mkdocs-pdf-export-plugin

      - name: Build documentation PDF
        env:
          ENABLE_PDF_EXPORT: "1"
        run: mkdocs build --strict --config-file user-docs/mkdocs.yml

      - name: Rename docs PDF with version
        shell: bash
        env:
          DOCS_PDF_VERSION: ${{ inputs.docs_pdf_version }}
        run: |
          set -euo pipefail
          SRC="user-docs/site/pdf/belotable-documentation.pdf"
          DST="user-docs/site/pdf/belotable-documentation-v${DOCS_PDF_VERSION}.pdf"
          if [[ ! -f "$SRC" ]]; then
            echo "ERROR: Expected PDF not found at $SRC" >&2
            exit 1
          fi
          mv "$SRC" "$DST"

      - name: Upload docs PDF artifact
        uses: actions/upload-artifact@v4
        with:
          name: docs-pdf
          path: user-docs/site/pdf/belotable-documentation-v${{ inputs.docs_pdf_version }}.pdf
          if-no-files-found: error
          retention-days: 7

  scan-with-trivy:
    needs: build-docker-web
    runs-on: ubuntu-latest
    env:
      TRIVY_SKIP_DB_UPDATE: true # DB updates were done by a daily workflow
      TRIVY_SKIP_JAVA_DB_UPDATE: true # DB updates were done by a daily workflow

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.checkout_ref }}
          fetch-depth: 1

      - name: Generate Trivy Report about FileSystem
        uses: aquasecurity/trivy-action@master
        with:
          trivy-config: trivy.yaml
          scan-type: fs
          output: trivy-fs-report.json
          format: json
          scan-ref: .
          severity: LOW,MEDIUM,HIGH,CRITICAL
          exit-code: 0

      - name: Generate Trivy Report about Docker Container Image
        uses: aquasecurity/trivy-action@master
        with:
          skip-setup-trivy: true
          trivy-config: trivy.yaml
          scan-type: image
          output: trivy-image-report.json
          format: json
          image-ref: ${{ inputs.image_name }}:${{ inputs.release_tag }}
          severity: LOW,MEDIUM,HIGH,CRITICAL
          exit-code: 0

      - name: Generate Trivy Report about FileSystem for GitHub Code Scanning
        uses: aquasecurity/trivy-action@master
        with:
          skip-setup-trivy: true
          trivy-config: trivy.yaml
          scan-type: fs
          output: trivy-fs-report.sarif
          format: sarif
          scan-ref: .
          severity: HIGH,CRITICAL
          exit-code: 0

      - name: Upload Trivy scan results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: trivy-fs-report.sarif

      - name: Run Trivy in GitHub SBOM mode and submit results to Dependency Graph
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          skip-setup-trivy: true
          scan-type: fs
          format: github
          output: dependency-results.sbom.json
          scan-ref: .
          severity: LOW,MEDIUM,HIGH,CRITICAL
          github-pat: ${{ secrets.GITHUB_TOKEN }}
          exit-code: 0

      - name: Generate Trivy SBOM report as cyclonedx format
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          skip-setup-trivy: true
          scan-type: fs
          format: cyclonedx
          output: cyclonedx.sbom.json
          scan-ref: .
          severity: LOW,MEDIUM,HIGH,CRITICAL
          exit-code: 0

      - name: Generate Trivy SBOM report as spdx-json format
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          skip-setup-trivy: true
          scan-type: fs
          format: spdx-json
          output: spdx-json.sbom.json
          scan-ref: .
          severity: LOW,MEDIUM,HIGH,CRITICAL
          exit-code: 0

      - name: Upload Trivy Scan Results
        uses: actions/upload-artifact@v4
        with:
          retention-days: 7
          name: trivy-reports
          path: |
            trivy-fs-report.json
            trivy-image-report.json
            trivy-fs-report.sarif
            dependency-results.sbom.json
            cyclonedx.sbom.json
            spdx-json.sbom.json

      - name: Scan with Trivy about FileSystem
        id: trivy_scan_fs
        uses: aquasecurity/trivy-action@master
        continue-on-error: true
        with:
          skip-setup-trivy: true
          trivy-config: trivy.yaml
          scan-type: fs
          scan-ref: .
          exit-code: 1

      - name: Scan with Trivy about Docker Container Image
        id: trivy_scan_image
        uses: aquasecurity/trivy-action@master
        continue-on-error: true
        with:
          skip-setup-trivy: true
          trivy-config: trivy.yaml
          scan-type: image
          image-ref: ${{ inputs.image_name }}:${{ inputs.release_tag }}
          exit-code: 1

      - name: Fail if major vulnerabilities found
        if: ${{ steps.trivy_scan_fs.outcome == 'failure' || steps.trivy_scan_image.outcome == 'failure' }}
        run: |
          echo "ERROR: Trivy scan found vulnerabilities with severity HIGH or CRITICAL" >&2
          exit 1
