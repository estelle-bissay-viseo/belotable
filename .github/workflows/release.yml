name: Release Technical Pipeline

on:
  push:
    branches:
      - release
  workflow_dispatch:

permissions:
  contents: write
  packages: write

concurrency:
  group: release-technical-${{ github.ref }}
  cancel-in-progress: true

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      flutter_version: ${{ steps.vars.outputs.flutter_version }}
      current_version: ${{ steps.vars.outputs.current_version }}
      release_version: ${{ steps.vars.outputs.release_version }}
      next_dev_version: ${{ steps.vars.outputs.next_dev_version }}
      release_tag: ${{ steps.vars.outputs.release_tag }}
      release_title: ${{ steps.vars.outputs.release_title }}
      image_name: ${{ steps.vars.outputs.image_name }}
      release_sha: ${{ steps.update_version.outputs.commit_sha }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.sha }}
          fetch-depth: 1

      - name: Compute release variables
        id: vars
        shell: bash
        run: |
          FLUTTER_VERSION="$(sed -nE 's/.*"flutter"[[:space:]]*:[[:space:]]*"([^"]+)".*/\1/p' .fvmrc | head -n1)"
          if [[ -z "$FLUTTER_VERSION" ]]; then
            echo "ERROR: Unable to read Flutter version from .fvmrc" >&2
            exit 1
          fi

          CURRENT_VERSION="$(sed -nE 's/^version:[[:space:]]*([^[:space:]]+).*$/\1/p' belotable/pubspec.yaml | head -n1)"
          if [[ -z "$CURRENT_VERSION" ]]; then
            echo "ERROR: Unable to read version from belotable/pubspec.yaml" >&2
            exit 1
          fi

          RELEASE_VERSION="$(printf '%s' "$CURRENT_VERSION" | sed -E 's/^([0-9]+\.[0-9]+\.[0-9]+).*/\1/')"
          if [[ -z "$RELEASE_VERSION" ]]; then
            echo "ERROR: Unable to derive stable release version from $CURRENT_VERSION" >&2
            exit 1
          fi

          IFS='.' read -r MAJOR MINOR PATCH <<< "$RELEASE_VERSION"
          NEXT_PATCH=$((PATCH + 1))
          NEXT_DEV_VERSION="${MAJOR}.${MINOR}.${NEXT_PATCH}-alpha"

          RELEASE_TAG="v$RELEASE_VERSION"
          RELEASE_TITLE="Release v$RELEASE_VERSION"
          IMAGE_NAME="ghcr.io/${GITHUB_REPOSITORY,,}-web"

          {
            echo "flutter_version=$FLUTTER_VERSION"
            echo "current_version=$CURRENT_VERSION"
            echo "release_version=$RELEASE_VERSION"
            echo "next_dev_version=$NEXT_DEV_VERSION"
            echo "release_tag=$RELEASE_TAG"
            echo "release_title=$RELEASE_TITLE"
            echo "image_name=$IMAGE_NAME"
          } >> "$GITHUB_OUTPUT"

      - name: Configure Git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Update release version
        id: update_version
        shell: bash
        env:
          RELEASE_VERSION: ${{ steps.vars.outputs.release_version }}
          RELEASE_TAG: ${{ steps.vars.outputs.release_tag }}
        run: |
          set -euo pipefail

          update_pubspec_version() {
            local target_version="$1"
            sed -i -E "s/^version:[[:space:]]*[^[:space:]]+$/version: ${target_version}/" belotable/pubspec.yaml
          }

          git fetch origin release main dev --tags

          if git ls-remote --tags origin "refs/tags/${RELEASE_TAG}" | grep -q .; then
            echo "ERROR: Tag ${RELEASE_TAG} already exists on remote." >&2
            exit 1
          fi

          git checkout -B release origin/release
          
          update_pubspec_version "$RELEASE_VERSION"
          if ! git diff --quiet -- belotable/pubspec.yaml; then
            git add belotable/pubspec.yaml
            git commit -m "chore(release): set version ${RELEASE_VERSION}"
            git push origin release
          fi
          
          RELEASE_SHA="$(git rev-parse HEAD)"
          echo "commit_sha=$RELEASE_SHA" >> "$GITHUB_OUTPUT"

  build-docker-web:
    needs: prepare
    runs-on: ubuntu-latest
    outputs:
      image_digest: ${{ steps.docker_build.outputs.digest }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare.outputs.release_sha }}
          fetch-depth: 1

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ needs.prepare.outputs.flutter_version }}
          channel: stable
          cache: true

      - name: Install dependencies
        working-directory: belotable
        run: flutter pub get

      - name: Run tests
        working-directory: belotable
        run: flutter test --coverage

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ needs.prepare.outputs.image_name }}
          tags: |
            type=raw,value=${{ needs.prepare.outputs.release_tag }}
            type=raw,value=release
            type=ref,event=branch
            type=sha,prefix=sha-

      - name: Build and push
        id: docker_build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: build/docker/Dockerfile
          build-args: |
            FLUTTER_VERSION=${{ needs.prepare.outputs.flutter_version }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-windows-installer:
    needs: prepare
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare.outputs.release_sha }}
          fetch-depth: 1

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ needs.prepare.outputs.flutter_version }}
          channel: stable
          cache: true

      - name: Install dependencies
        working-directory: belotable
        run: flutter pub get

      - name: Run tests
        working-directory: belotable
        run: flutter test --coverage

      - name: Build Windows release
        working-directory: belotable
        run: flutter build windows --release

      - name: Install Inno Setup
        run: choco install innosetup --no-progress -y

      - name: Build installer (Inno Setup)
        shell: pwsh
        run: ./build/windows-build-innosetup.ps1 -OutputDir "$env:GITHUB_WORKSPACE/artifacts/windows"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: artifacts/windows/*
          if-no-files-found: error
          retention-days: 7

  publish-release-and-sync:
    needs:
      - prepare
      - build-docker-web
      - build-windows-installer
    runs-on: ubuntu-latest
    env:
      RELEASE_BRANCH: release
      MAIN_BRANCH: main
      DEV_BRANCH: dev

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download Windows installer artifact
        uses: actions/download-artifact@v4
        with:
          name: windows-installer
          path: release-assets/windows

      - name: Configure Git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Create and push release tag
        shell: bash
        env:
          RELEASE_SHA: ${{ needs.prepare.outputs.release_sha }}
          RELEASE_TAG: ${{ needs.prepare.outputs.release_tag }}
          RELEASE_VERSION: ${{ needs.prepare.outputs.release_version }}
        run: |
          set -euo pipefail

          git fetch origin --tags

          git tag -a "$RELEASE_TAG" -m "Release ${RELEASE_VERSION}" "$RELEASE_SHA"
          git push origin "$RELEASE_TAG"

      - name: Generate release notes
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ needs.prepare.outputs.release_tag }}
          RELEASE_SHA: ${{ needs.prepare.outputs.release_sha }}
          RELEASE_VERSION: ${{ needs.prepare.outputs.release_version }}
        run: |
          set -euo pipefail

          CURRENT_VERSION="$RELEASE_VERSION"
          PREVIOUS_TAG=""

          mapfile -t SEMVER_TAGS < <(
            git tag --list |
              grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' |
              sed 's/^v//' |
              sort -V || true
          )

          PREVIOUS_VERSION=""
          for version in "${SEMVER_TAGS[@]}"; do
            if [[ "$version" == "$CURRENT_VERSION" ]]; then
              break
            fi
            PREVIOUS_VERSION="$version"
          done

          if [[ -n "$PREVIOUS_VERSION" ]]; then
            PREVIOUS_TAG="v${PREVIOUS_VERSION}"
            echo "Generating release notes from ${PREVIOUS_TAG} to ${RELEASE_TAG}"
          else
            echo "No previous SemVer tag found before ${RELEASE_TAG}; generating full release notes range"
          fi

          GH_API_ARGS=(
            --method POST
            "repos/${GITHUB_REPOSITORY}/releases/generate-notes"
            -f tag_name="$RELEASE_TAG"
            -f target_commitish="$RELEASE_SHA"
          )

          if [[ -n "$PREVIOUS_TAG" ]]; then
            GH_API_ARGS+=( -f previous_tag_name="$PREVIOUS_TAG" )
          fi

          gh api "${GH_API_ARGS[@]}" --jq '.body' > release-notes.generated.md

      - name: Publish release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ needs.prepare.outputs.release_tag }}
          RELEASE_TITLE: ${{ needs.prepare.outputs.release_title }}
          RELEASE_SHA: ${{ needs.prepare.outputs.release_sha }}
          RELEASE_VERSION: ${{ needs.prepare.outputs.release_version }}
          IMAGE_NAME: ${{ needs.prepare.outputs.image_name }}
          IMAGE_DIGEST: ${{ needs.build-docker-web.outputs.image_digest }}
        run: |
          set -euo pipefail
          shopt -s nullglob

          INSTALLERS=(release-assets/windows/*.exe)
          if [[ ${#INSTALLERS[@]} -eq 0 ]]; then
            echo "ERROR: No Windows installer found in release-assets/windows" >&2
            exit 1
          fi

          if [[ -f release-notes.generated.md && -s release-notes.generated.md ]]; then
            {
              cat release-notes.generated.md
              echo
            } > release-notes.md
          else
            touch release-notes.md
          fi

          cat >> release-notes.md <<EOF
          ## Automated release

          - Version: ${RELEASE_VERSION}
          - Docker image: ${IMAGE_NAME}:${RELEASE_TAG}
          - Docker digest: ${IMAGE_DIGEST}
          - Pull command: docker pull ${IMAGE_NAME}@${IMAGE_DIGEST}
          EOF

          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            echo "ERROR: GitHub release for tag ${RELEASE_TAG} already exists." >&2
            exit 1
          fi

          gh release create "$RELEASE_TAG" "${INSTALLERS[@]}" \
            --target "$RELEASE_SHA" \
            --title "$RELEASE_TITLE" \
            --latest \
            --draft \
            --notes-file release-notes.md

      - name: Merge release into main then prepare dev
        shell: bash
        env:
          RELEASE_SHA: ${{ needs.prepare.outputs.release_sha }}
          RELEASE_VERSION: ${{ needs.prepare.outputs.release_version }}
          NEXT_DEV_VERSION: ${{ needs.prepare.outputs.next_dev_version }}
        run: |
          set -euo pipefail

          update_pubspec_version() {
            local target_version="$1"
            sed -i -E "s/^version:[[:space:]]*[^[:space:]]+$/version: ${target_version}/" belotable/pubspec.yaml
          }

          git fetch origin "$RELEASE_BRANCH" "$MAIN_BRANCH" "$DEV_BRANCH" --tags

          git checkout -B "$MAIN_BRANCH" "origin/$MAIN_BRANCH"
          git merge --no-ff "$RELEASE_SHA" -m "chore(release): merge $RELEASE_BRANCH into $MAIN_BRANCH"
          MAIN_SHA="$(git rev-parse HEAD)"
          git push origin "$MAIN_BRANCH"

          git checkout -B "$DEV_BRANCH" "origin/$DEV_BRANCH"
          git merge --no-ff "$MAIN_SHA" -m "chore(release): sync $MAIN_BRANCH into $DEV_BRANCH"

          update_pubspec_version "$NEXT_DEV_VERSION"
          if ! git diff --quiet -- belotable/pubspec.yaml; then
            git add belotable/pubspec.yaml
            git commit -m "chore(dev): start ${NEXT_DEV_VERSION}"
          fi
          git push origin "$DEV_BRANCH"