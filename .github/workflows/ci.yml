name: Dev CI and Pre-release (Web + Windows)

on:
  push:
    branches:
      - dev
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review

permissions:
  contents: write
  packages: write
  checks: write
  issues: write
  pull-requests: write
  security-events: write
  actions: write

concurrency:
  group: build-release-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  prepare:
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'push' ||
      (
        github.event_name == 'pull_request' &&
        github.event.pull_request.draft == false &&
        (
          github.event.pull_request.author_association == 'OWNER' ||
          github.event.pull_request.author_association == 'COLLABORATOR'
        )
      )
    outputs:
      flutter_version: ${{ steps.vars.outputs.flutter_version }}
      app_version: ${{ steps.vars.outputs.app_version }}
      release_tag: ${{ steps.vars.outputs.release_tag }}
      release_title: ${{ steps.vars.outputs.release_title }}
      image_name: ${{ steps.vars.outputs.image_name }}

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          fetch-depth: 1

      - name: Compute shared variables
        id: vars
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          FLUTTER_VERSION="$(sed -nE 's/.*"flutter"[[:space:]]*:[[:space:]]*"([^"]+)".*/\1/p' .fvmrc | head -n1)"
          if [[ -z "$FLUTTER_VERSION" ]]; then
            echo "ERROR: Unable to read Flutter version from .fvmrc" >&2
            exit 1
          fi

          APP_VERSION="$(sed -nE 's/^version:[[:space:]]*([0-9]+\.[0-9]+\.[0-9]+(-[^+[:space:]]+)?)(\+[0-9A-Za-z.-]+)?[[:space:]]*$/\1/p' belotable/pubspec.yaml | head -n1)"
          if [[ -z "$APP_VERSION" ]]; then
            echo "ERROR: Unable to read app version from belotable/pubspec.yaml" >&2
            exit 1
          fi

          IMAGE_NAME="ghcr.io/${GITHUB_REPOSITORY,,}-web"

          if [[ "$EVENT_NAME" == "push" ]]; then
            RELEASE_TAG="dev-latest"
            RELEASE_TITLE="Dev build v$APP_VERSION"
          else
            RELEASE_TAG="pr-$PR_NUMBER"
            RELEASE_TITLE="PR $PR_NUMBER - build v$APP_VERSION"
          fi

          {
            echo "flutter_version=$FLUTTER_VERSION"
            echo "app_version=$APP_VERSION"
            echo "release_tag=$RELEASE_TAG"
            echo "release_title=$RELEASE_TITLE"
            echo "image_name=$IMAGE_NAME"
          } >> "$GITHUB_OUTPUT"

  quality-build:
    needs: prepare
    uses: ./.github/workflows/_shared-build-scan.yml
    with:
      checkout_ref: ${{ github.event.pull_request.head.sha || github.sha }}
      flutter_version: ${{ needs.prepare.outputs.flutter_version }}
      image_name: ${{ needs.prepare.outputs.image_name }}
      release_tag: ${{ needs.prepare.outputs.release_tag }}
      docs_pdf_version: ${{ needs.prepare.outputs.app_version }}
      docker_metadata_tags: |
        type=raw,value=${{ needs.prepare.outputs.release_tag }}
        type=ref,event=branch
        type=ref,event=pr
        type=sha,prefix=sha-
        type=semver,pattern={{version}}
        type=raw,value=latest,enable={{is_default_branch}}
      enable_pr_analyze_comment: true

  publish-prerelease:
    needs:
      - prepare
      - quality-build
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'push' &&
      github.ref_name == 'dev' &&
      needs.prepare.result == 'success' &&
      needs.quality-build.result == 'success'

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 1

      - name: Move prerelease tag to current commit
        shell: bash
        env:
          RELEASE_TAG: ${{ needs.prepare.outputs.release_tag }}
        run: |
          set -euo pipefail

          git fetch origin --tags
          git tag -f "$RELEASE_TAG" "$GITHUB_SHA"
          git push --force origin "refs/tags/$RELEASE_TAG"

      - name: Download Windows installer artifact
        uses: actions/download-artifact@v8
        with:
          name: windows-installer
          path: release-assets/windows

      - name: Download docs PDF artifact
        uses: actions/download-artifact@v8
        with:
          name: docs-pdf
          path: release-assets/docs

      - name: Download SBOM artifact
        uses: actions/download-artifact@v8
        with:
          name: trivy-reports
          path: release-assets/trivy-reports

      - name: Generate release notes
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ needs.prepare.outputs.release_tag }}
        run: |
          set -euo pipefail

          git fetch origin --tags

          mapfile -t SEMVER_TAGS < <(
            git tag --list |
              grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' |
              sed 's/^v//' |
              sort -V || true
          )

          PREVIOUS_TAG=""
          if [[ ${#SEMVER_TAGS[@]} -gt 0 ]]; then
            LAST_VERSION="${SEMVER_TAGS[-1]}"
            PREVIOUS_TAG="v${LAST_VERSION}"
            echo "Generating release notes from ${PREVIOUS_TAG} to ${RELEASE_TAG}"
          else
            echo "No previous SemVer release tag found; generating full release notes range"
          fi

          GH_API_ARGS=(
            --method POST
            "repos/${GITHUB_REPOSITORY}/releases/generate-notes"
            -f tag_name="$RELEASE_TAG"
            -f target_commitish="$GITHUB_SHA"
          )

          if [[ -n "$PREVIOUS_TAG" ]]; then
            GH_API_ARGS+=( -f previous_tag_name="$PREVIOUS_TAG" )
          fi

          gh api "${GH_API_ARGS[@]}" --jq '.body' > release-notes.generated.md

      - name: Publish release (notes + installer + Docker metadata)
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ needs.prepare.outputs.release_tag }}
          RELEASE_TITLE: ${{ needs.prepare.outputs.release_title }}
          IMAGE_NAME: ${{ needs.prepare.outputs.image_name }}
          IMAGE_DIGEST: ${{ needs.quality-build.outputs.image_digest }}
        run: |
          set -euo pipefail
          shopt -s nullglob

          INSTALLERS=(release-assets/windows/*.exe)
          if [[ ${#INSTALLERS[@]} -eq 0 ]]; then
            echo "ERROR: No Windows installer found in release-assets/windows" >&2
            exit 1
          fi

          DOC_PDFS=(release-assets/docs/*.pdf)
          if [[ ${#DOC_PDFS[@]} -eq 0 ]]; then
            echo "ERROR: No documentation PDF found in release-assets/docs" >&2
            exit 1
          fi

          SBOM_FILES=(release-assets/trivy-reports/*.sbom.json)
          if [[ ${#SBOM_FILES[@]} -eq 0 ]]; then
            echo "ERROR: No SBOM files found in release-assets/trivy-reports" >&2
          fi

          RELEASE_ASSETS=("${INSTALLERS[@]}" "${DOC_PDFS[@]}" "${SBOM_FILES[@]}")

          if [[ -f release-notes.generated.md && -s release-notes.generated.md ]]; then
            {
              cat release-notes.generated.md
              echo
            } > release-notes.md
          else
            printf 'Automated build assets.\n\n' > release-notes.md
          fi

          cat >> release-notes.md <<EOF
          ## Web Docker image

          - Image: ${IMAGE_NAME}:${RELEASE_TAG}
          - Digest: ${IMAGE_DIGEST}
          - Pull command: docker pull ${IMAGE_NAME}@${IMAGE_DIGEST}
          EOF

          RELEASE_EXISTS=false
          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            RELEASE_EXISTS=true
          fi

          if [[ "$RELEASE_EXISTS" == "true" ]]; then
            gh release edit "$RELEASE_TAG" \
              --title "$RELEASE_TITLE" \
              --prerelease \
              --latest=false \
              --notes-file release-notes.md

            mapfile -t EXISTING_ASSET_IDS < <(
              gh api "repos/${GITHUB_REPOSITORY}/releases/tags/${RELEASE_TAG}" \
                --jq '.assets[].id' 2>/dev/null || true
            )

            if [[ ${#EXISTING_ASSET_IDS[@]} -gt 0 ]]; then
              for ASSET_ID in "${EXISTING_ASSET_IDS[@]}"; do
                gh api --method DELETE "repos/${GITHUB_REPOSITORY}/releases/assets/${ASSET_ID}"
              done
            fi

            gh release upload "$RELEASE_TAG" "${RELEASE_ASSETS[@]}" --clobber
          else
            gh release create "$RELEASE_TAG" "${RELEASE_ASSETS[@]}" \
              --target "$GITHUB_SHA" \
              --title "$RELEASE_TITLE" \
              --prerelease \
              --latest=false \
              --notes-file release-notes.md
          fi

  retry-on-failure:
        if: failure() && fromJSON(github.run_attempt) < 2
        needs:
          - prepare
          - quality-build
          - publish-prerelease
        runs-on: ubuntu-latest
        steps:
            - env:
                  GH_REPO: ${{ github.repository }}
                  GH_TOKEN: ${{ github.token }}
              run: gh workflow run _retry-workflow.yml -r ${{ github.head_ref || github.ref_name }} -F run_id=${{ github.run_id }}