name: Dev CI and Pre-release (Web + Windows)

on:
  push:
    branches:
      - dev
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review

permissions:
  contents: write
  packages: write
  checks: write
  issues: write
  pull-requests: write
  security-events: write

concurrency:
  group: build-release-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  prepare:
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'push' ||
      (
        github.event_name == 'pull_request' &&
        github.event.pull_request.draft == false &&
        (
          github.event.pull_request.author_association == 'OWNER' ||
          github.event.pull_request.author_association == 'COLLABORATOR'
        )
      )
    outputs:
      flutter_version: ${{ steps.vars.outputs.flutter_version }}
      app_version: ${{ steps.vars.outputs.app_version }}
      release_tag: ${{ steps.vars.outputs.release_tag }}
      release_title: ${{ steps.vars.outputs.release_title }}
      image_name: ${{ steps.vars.outputs.image_name }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          fetch-depth: 1

      - name: Compute shared variables
        id: vars
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          FLUTTER_VERSION="$(sed -nE 's/.*"flutter"[[:space:]]*:[[:space:]]*"([^"]+)".*/\1/p' .fvmrc | head -n1)"
          if [[ -z "$FLUTTER_VERSION" ]]; then
            echo "ERROR: Unable to read Flutter version from .fvmrc" >&2
            exit 1
          fi

          APP_VERSION="$(sed -nE 's/^version:[[:space:]]*([0-9]+\.[0-9]+\.[0-9]+(-[^+[:space:]]+)?)(\+[0-9A-Za-z.-]+)?[[:space:]]*$/\1/p' belotable/pubspec.yaml | head -n1)"
          if [[ -z "$APP_VERSION" ]]; then
            echo "ERROR: Unable to read app version from belotable/pubspec.yaml" >&2
            exit 1
          fi

          IMAGE_NAME="ghcr.io/${GITHUB_REPOSITORY,,}-web"

          if [[ "$EVENT_NAME" == "push" ]]; then
            RELEASE_TAG="dev-latest"
            RELEASE_TITLE="Dev build v$APP_VERSION"
          else
            RELEASE_TAG="pr-$PR_NUMBER"
            RELEASE_TITLE="PR $PR_NUMBER - build v$APP_VERSION"
          fi

          {
            echo "flutter_version=$FLUTTER_VERSION"
            echo "app_version=$APP_VERSION"
            echo "release_tag=$RELEASE_TAG"
            echo "release_title=$RELEASE_TITLE"
            echo "image_name=$IMAGE_NAME"
          } >> "$GITHUB_OUTPUT"

  semgrep:
    needs: prepare
    runs-on: ubuntu-latest
    timeout-minutes: 10
    container:
      image: semgrep/semgrep

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          fetch-depth: 1

      - name: Run Semgrep full output without quality gate
        run: semgrep scan --config=auto --config=p/owasp-top-ten  --config=p/cwe-top-25  --config=p/security-audit --config=p/trailofbits --json-output=semgrep.result.json
        continue-on-error: true # we want to report all issues first, then apply quality gate in a separate step

      - name: Upload Semgrep Scan Results
        uses: actions/upload-artifact@v4
        with:
          retention-days: 7
          name: semgrep-reports
          path: |
            semgrep.result.json
            
      - name: Run Semgrep with quality gate
        run: semgrep ci --config=auto --config=p/owasp-top-ten --config=p/cwe-top-25 --config=p/security-audit --config=p/trailofbits

  test:
    needs:
      - prepare
      - semgrep
    runs-on: windows-latest # tests are executed on Windows to share cache with Windows build job and speed up overall workflow execution
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          fetch-depth: 1

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ needs.prepare.outputs.flutter_version }}
          channel: stable
          cache: true

      - name: Install dependencies
        working-directory: belotable
        run: flutter pub get

      - name: Analyze code
        id: flutter_analyze
        working-directory: belotable
        shell: pwsh
        run: |
          flutter analyze --no-fatal-infos | Tee-Object -FilePath flutter_analyze_report.log
          echo "exit_code=$LASTEXITCODE" >> $env:GITHUB_OUTPUT
        continue-on-error: true
      
      - name: Annotate code with analyzer results
        shell: pwsh
        if: steps.flutter_analyze.conclusion != 'skipped'
        working-directory: belotable
        run: |
          Get-Content flutter_analyze_report.log | ForEach-Object {
            if ($_ -match '^\s*(?<severity>\w+) - (?<message>.+) - (?<file>.+):(?<line>\d+):(?<col>\d+) - (?<rule>.+)$') {
              $severity = $matches['severity']
              $message = $matches['message']
              $file = $matches['file']
              # normalize file path
              $file = $file -replace '\\', '/'
              $file = "belotable/$file"
              $line = $matches['line']
              $col = $matches['col']
              $rule = $matches['rule']
              $fullMessage = "$message ($rule) [severity=$severity]"

              switch ($severity) {
                "error" {
                  Write-Output "::error file=$file,line=$line,col=$col::$fullMessage"
                }
                "warning" {
                  Write-Output "::warning file=$file,line=$line,col=$col::$fullMessage"
                }
                default {
                  Write-Output "::notice file=$file,line=$line,col=$col::$fullMessage"
                }
              }
            }
          }
      
      - name: Comment PR with analyzer results
        if: steps.flutter_analyze.conclusion != 'skipped' && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            // read and parse the analyzer report to extract issues
            const fs = require('fs');
            const content = fs.readFileSync('belotable/flutter_analyze_report.log', 'utf8');
            const lines = content.split('\n');
            const issues = [];
            const regex = /^\s*(\w+)\s+-\s+(.+?)\s+-\s+(.+?):(\d+):(\d+)\s+-\s+(.+)$/;
            for (const line of lines) {
              const cleaned = line.replace(/\r/g, '').trim();
              const match = cleaned.match(regex);
              if (!match) continue;
              const severity = match[1];
              const message = match[2];
              const file = `belotable/${match[3].replace(/\\/g, '/')}`;
              const lineNum = parseInt(match[4], 10);
              const rule = match[6];
              issues.push({ severity, message, file, line: lineNum, rule });
            }
            // sort issues by file and line number
            issues.sort((a, b) => {
              if (a.file === b.file) return a.line - b.line;
              return a.file.localeCompare(b.file);
            });
            // group issues by file
            const grouped = {};
            for (const issue of issues) {
              if (!grouped[issue.file]) {
                grouped[issue.file] = [];
              }
              grouped[issue.file].push(issue);
            }

            // prepare comment body with markdown formatting
            const severityIcon = {
              error: '🔴',
              warning: '🟡',
              info: '🟢',
            };
            let body = `## Flutter Analyze Report\n\n`;
            body += `This comment has been updated with latest results.\n\n`;
            body += `This report concerns all files in the \`belotable\` directory, not only the files changed in this PR.\n\n`;
            body += `---\n`;
            // summary of issues by severity
            const total = issues.length;
            const errors = issues.filter(i => i.severity === 'error').length;
            const warnings = issues.filter(i => i.severity === 'warning').length;
            const infos = issues.filter(i => i.severity === 'info').length;
            const unknown = issues.filter(i => i.severity !== 'error' && i.severity !== 'warning' && i.severity !== 'info').length;
            body += `### Total: ${total} issues\n\n`;
            body += `| Severity | Count |\n`;
            body += `|----------|-------|\n`;
            body += `| 🔴 Errors | ${errors} |\n`;
            body += `| 🟡 Warnings | ${warnings} |\n`;
            body += `| 🟢 Info | ${infos} |\n`;
            body += `| ⚪ Unknown severity | ${unknown} |\n`;
            body += `\n`;
            body += `---\n`;
            // detailed table of issues grouped by file
            for (const file of Object.keys(grouped)) {
              body += `### ${file}\n`;
              body += `| Line | Severity | Rule | Message |\n`;
              body += `|------|--------|------|--------|\n`;
              for (const issue of grouped[file]) {
                const icon = severityIcon[issue.severity] || '⚪';
                body += `| ${issue.line} | ${icon} ${issue.severity} | ${issue.rule} | ${issue.message} |\n`;
              }
              body += `\n`;
            }
            // check if a comment with the same header already exists, if so update it, otherwise create a new one
            const comments = await github.rest.issues.listComments({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo
            });
            const existing = comments.data.find(c =>
              c.body.includes('## Flutter Analyze Report')
            );
            if (existing) {
              await github.rest.issues.updateComment({
                comment_id: existing.id,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: body
              });
            } else {
              await github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: body
              });
            }

      - name: Quality gate
        if: always() && steps.flutter_analyze.outputs.exit_code != '0'
        shell: pwsh
        run: |
          Write-Error "Flutter analyze failed (quality gate)"
          exit 1

      - name: Run tests
        working-directory: belotable
        run: flutter test --coverage -r github --file-reporter json:tests-report.json
        timeout-minutes: 12

      - name: Publish Test Results
        uses: EnricoMi/publish-unit-test-result-action/windows@v2
        if: (!cancelled())
        with:
          files: |
            belotable/tests-report.json

      - name: Publish test coverage to workflow summary
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const coveragePath = 'belotable/coverage/lcov.info';
            let coverageText = '❌ Coverage report not generated';

            if (fs.existsSync(coveragePath)) {
              const lines = fs.readFileSync(coveragePath, 'utf8').split('\n');
              const lineHit = Number(lines.find(l => l.startsWith('LH:'))?.split(':')[1] ?? 0);
              const lineFound = Number(lines.find(l => l.startsWith('LF:'))?.split(':')[1] ?? 0);
              if (lineFound > 0) {
                const pct = ((lineHit / lineFound) * 100).toFixed(2);
                coverageText = `✅ Coverage: ${pct}% (${lineHit}/${lineFound} lines)`;
              }
            }

            await core.summary
              .addHeading('Test Coverage')
              .addRaw(coverageText, true)
              .write();

  build-docker-web:
    needs:
      - prepare
      - test
    runs-on: ubuntu-latest
    outputs:
      image_digest: ${{ steps.docker_build.outputs.digest }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          fetch-depth: 1

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ needs.prepare.outputs.image_name }}
          tags: |
            type=raw,value=${{ needs.prepare.outputs.release_tag }}
            type=ref,event=branch
            type=ref,event=pr
            type=sha,prefix=sha-
            type=semver,pattern={{version}}
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push if approved
        id: docker_build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: build/docker/Dockerfile
          build-args: |
            FLUTTER_VERSION=${{ needs.prepare.outputs.flutter_version }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-windows-installer:
    needs:
      - prepare
      - test
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          fetch-depth: 1

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ needs.prepare.outputs.flutter_version }}
          channel: stable
          cache: true

      - name: Install dependencies
        working-directory: belotable
        run: flutter pub get

      - name: Build Windows release
        working-directory: belotable
        run: flutter build windows --release

      - name: Install Inno Setup
        run: choco install innosetup --no-progress -y

      - name: Build installer (Inno Setup)
        shell: pwsh
        run: ./build/windows-build-innosetup.ps1 -OutputDir "$env:GITHUB_WORKSPACE/artifacts/windows"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: artifacts/windows/*
          if-no-files-found: error
          retention-days: 7

  build-docs-pdf:
    needs: prepare
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          fetch-depth: 1

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install MkDocs dependencies
        run: |
          python -m pip install --upgrade pip
          pip install mkdocs mkdocs-material mkdocs-pdf-export-plugin

      - name: Build documentation PDF
        env:
          ENABLE_PDF_EXPORT: "1"
        run: mkdocs build --strict --config-file user-docs/mkdocs.yml

      - name: Rename docs PDF with app version
        shell: bash
        env:
          APP_VERSION: ${{ needs.prepare.outputs.app_version }}
        run: |
          set -euo pipefail
          SRC="user-docs/site/pdf/belotable-documentation.pdf"
          DST="user-docs/site/pdf/belotable-documentation-v${APP_VERSION}.pdf"
          if [[ ! -f "$SRC" ]]; then
            echo "ERROR: Expected PDF not found at $SRC" >&2
            exit 1
          fi
          mv "$SRC" "$DST"

      - name: Upload docs PDF artifact
        uses: actions/upload-artifact@v4
        with:
          name: docs-pdf
          path: user-docs/site/pdf/belotable-documentation-v${{ needs.prepare.outputs.app_version }}.pdf
          if-no-files-found: error
          retention-days: 7

  scan-with-trivy:
    needs:
     - prepare
     - build-docker-web
    runs-on: ubuntu-latest
    env:
      TRIVY_SKIP_DB_UPDATE: true # DB updates were done by a daily workflow
      TRIVY_SKIP_JAVA_DB_UPDATE: true # DB updates were done by a daily workflow

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          fetch-depth: 1

      - name: Generate Trivy Report about FileSystem
        uses: aquasecurity/trivy-action@master
        with:
          trivy-config: trivy.yaml
          scan-type: fs
          output: trivy-fs-report.json
          format: json
          scan-ref: .
          severity: LOW,MEDIUM,HIGH,CRITICAL
          exit-code: 0
      
      - name: Generate Trivy Report about Docker Container Image
        uses: aquasecurity/trivy-action@master
        with:
          skip-setup-trivy: true
          trivy-config: trivy.yaml
          scan-type: image
          output: trivy-image-report.json
          format: json
          image-ref: ${{ needs.prepare.outputs.image_name }}:${{ needs.prepare.outputs.release_tag }}
          severity: LOW,MEDIUM,HIGH,CRITICAL
          exit-code: 0

      - name: Generate Trivy Report about FileSystem for GitHub Code Scanning
        uses: aquasecurity/trivy-action@master
        with:
          skip-setup-trivy: true
          trivy-config: trivy.yaml
          scan-type: fs
          output: trivy-fs-report.sarif
          format: sarif
          scan-ref: .
          severity: HIGH,CRITICAL
          exit-code: 0

      - name: Upload Trivy scan results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: trivy-fs-report.sarif

      - name: Run Trivy in GitHub SBOM mode and submit results to Dependency Graph
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          skip-setup-trivy: true
          scan-type: fs
          format: github
          output: dependency-results.sbom.json
          scan-ref: .
          severity: LOW,MEDIUM,HIGH,CRITICAL
          github-pat: ${{ secrets.GITHUB_TOKEN }}
          exit-code: 0

      - name: Generate Trivy SBOM report as cyclonedx format
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          skip-setup-trivy: true
          scan-type: fs
          format: cyclonedx
          output: cyclonedx.sbom.json
          scan-ref: .
          severity: LOW,MEDIUM,HIGH,CRITICAL
          exit-code: 0

      - name: Generate Trivy SBOM report as spdx-json format
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          skip-setup-trivy: true
          scan-type: fs
          format: spdx-json
          output: spdx-json.sbom.json
          scan-ref: .
          severity: LOW,MEDIUM,HIGH,CRITICAL
          exit-code: 0

      - name: Upload Trivy Scan Results
        uses: actions/upload-artifact@v4
        with:
          retention-days: 7
          name: trivy-reports
          path: |
            trivy-fs-report.json
            trivy-image-report.json
            trivy-fs-report.sarif
            dependency-results.sbom.json
            cyclonedx.sbom.json
            spdx-json.sbom.json

      - name: Scan with Trivy about FileSystem
        id: trivy_scan_fs
        uses: aquasecurity/trivy-action@master
        continue-on-error: true
        with:
          skip-setup-trivy: true
          trivy-config: trivy.yaml
          scan-type: fs
          scan-ref: .
          exit-code: 1

      - name: Scan with Trivy about Docker Container Image
        id: trivy_scan_image
        uses: aquasecurity/trivy-action@master
        continue-on-error: true
        with:
          skip-setup-trivy: true
          trivy-config: trivy.yaml
          scan-type: image
          image-ref: ${{ needs.prepare.outputs.image_name }}:${{ needs.prepare.outputs.release_tag }}
          exit-code: 1

      - name: Fail if major vulnerabilities found
        if: ${{ steps.trivy_scan_fs.outcome == 'failure' || steps.trivy_scan_image.outcome == 'failure' }}
        run: |
          echo "ERROR: Trivy scan found vulnerabilities with severity HIGH or CRITICAL" >&2
          exit 1

  publish-prerelease:
    needs:
      - prepare
      - test
      - build-docker-web
      - build-windows-installer
      - build-docs-pdf
      - scan-with-trivy
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'push' &&
      github.ref_name == 'dev' &&
      needs.prepare.result == 'success' &&
      needs.test.result == 'success' &&
      needs.build-docker-web.result == 'success' &&
      needs.build-windows-installer.result == 'success' &&
      needs.build-docs-pdf.result == 'success'

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Move prerelease tag to current commit
        shell: bash
        env:
          RELEASE_TAG: ${{ needs.prepare.outputs.release_tag }}
        run: |
          set -euo pipefail

          git fetch origin --tags
          git tag -f "$RELEASE_TAG" "$GITHUB_SHA"
          git push --force origin "refs/tags/$RELEASE_TAG"

      - name: Download Windows installer artifact
        uses: actions/download-artifact@v4
        with:
          name: windows-installer
          path: release-assets/windows

      - name: Download docs PDF artifact
        uses: actions/download-artifact@v4
        with:
          name: docs-pdf
          path: release-assets/docs

      - name: Download SBOM artifact
        uses: actions/download-artifact@v4
        with:
          name: trivy-reports
          path: release-assets/trivy-reports

      - name: Generate release notes
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ needs.prepare.outputs.release_tag }}
        run: |
          set -euo pipefail

          git fetch origin --tags

          mapfile -t SEMVER_TAGS < <(
            git tag --list |
              grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' |
              sed 's/^v//' |
              sort -V || true
          )

          PREVIOUS_TAG=""
          if [[ ${#SEMVER_TAGS[@]} -gt 0 ]]; then
            LAST_VERSION="${SEMVER_TAGS[-1]}"
            PREVIOUS_TAG="v${LAST_VERSION}"
            echo "Generating release notes from ${PREVIOUS_TAG} to ${RELEASE_TAG}"
          else
            echo "No previous SemVer release tag found; generating full release notes range"
          fi

          GH_API_ARGS=(
            --method POST
            "repos/${GITHUB_REPOSITORY}/releases/generate-notes"
            -f tag_name="$RELEASE_TAG"
            -f target_commitish="$GITHUB_SHA"
          )

          if [[ -n "$PREVIOUS_TAG" ]]; then
            GH_API_ARGS+=( -f previous_tag_name="$PREVIOUS_TAG" )
          fi

          gh api "${GH_API_ARGS[@]}" --jq '.body' > release-notes.generated.md

      - name: Publish release (notes + installer + Docker metadata)
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ needs.prepare.outputs.release_tag }}
          RELEASE_TITLE: ${{ needs.prepare.outputs.release_title }}
          IMAGE_NAME: ${{ needs.prepare.outputs.image_name }}
          IMAGE_DIGEST: ${{ needs.build-docker-web.outputs.image_digest }}
        run: |
          set -euo pipefail
          shopt -s nullglob

          INSTALLERS=(release-assets/windows/*.exe)
          if [[ ${#INSTALLERS[@]} -eq 0 ]]; then
            echo "ERROR: No Windows installer found in release-assets/windows" >&2
            exit 1
          fi

          DOC_PDFS=(release-assets/docs/*.pdf)
          if [[ ${#DOC_PDFS[@]} -eq 0 ]]; then
            echo "ERROR: No documentation PDF found in release-assets/docs" >&2
            exit 1
          fi

          SBOM_FILES=(release-assets/trivy-reports/*.sbom.json)
          if [[ ${#SBOM_FILES[@]} -eq 0 ]]; then
            echo "ERROR: No SBOM files found in release-assets/trivy-reports" >&2
          fi

          RELEASE_ASSETS=("${INSTALLERS[@]}" "${DOC_PDFS[@]}" "${SBOM_FILES[@]}")

          if [[ -f release-notes.generated.md && -s release-notes.generated.md ]]; then
            {
              cat release-notes.generated.md
              echo
            } > release-notes.md
          else
            printf 'Automated build assets.\n\n' > release-notes.md
          fi

          cat >> release-notes.md <<EOF
          ## Web Docker image

          - Image: ${IMAGE_NAME}:${RELEASE_TAG}
          - Digest: ${IMAGE_DIGEST}
          - Pull command: docker pull ${IMAGE_NAME}@${IMAGE_DIGEST}
          EOF

          RELEASE_EXISTS=false
          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            RELEASE_EXISTS=true
          fi

          if [[ "$RELEASE_EXISTS" == "true" ]]; then
            gh release edit "$RELEASE_TAG" \
              --title "$RELEASE_TITLE" \
              --prerelease \
              --latest=false \
              --notes-file release-notes.md

            mapfile -t EXISTING_ASSET_IDS < <(
              gh api "repos/${GITHUB_REPOSITORY}/releases/tags/${RELEASE_TAG}" \
                --jq '.assets[].id' 2>/dev/null || true
            )

            if [[ ${#EXISTING_ASSET_IDS[@]} -gt 0 ]]; then
              for ASSET_ID in "${EXISTING_ASSET_IDS[@]}"; do
                gh api --method DELETE "repos/${GITHUB_REPOSITORY}/releases/assets/${ASSET_ID}"
              done
            fi

            gh release upload "$RELEASE_TAG" "${RELEASE_ASSETS[@]}" --clobber
          else
            gh release create "$RELEASE_TAG" "${RELEASE_ASSETS[@]}" \
              --target "$GITHUB_SHA" \
              --title "$RELEASE_TITLE" \
              --prerelease \
              --latest=false \
              --notes-file release-notes.md
          fi
