server {
    listen       8080;
    server_name  _;
    root         /usr/share/nginx/html;
    index        index.html;

    # Compression gzip
    gzip             on;
    gzip_comp_level  5;
    gzip_min_length  1000;
    gzip_types
        text/plain
        text/css
        application/json
        application/javascript
        text/javascript
        application/wasm
        image/svg+xml;

    # Cache long terme uniquement pour les assets dont le nom contient un hash
    # Exemples: app.3f2a9c1b.js, styles-a1b2c3d4.css
    location ~* "^/[^/]*[._-][0-9a-f]{8,}[^/]*\.(js|css|wasm|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$" {
        expires    1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # Cache court pour les assets non hashés (bootstrap/entrypoints)
    location ~* \.(js|css|wasm|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        add_header Cache-Control "public, max-age=3600, must-revalidate";
        access_log off;
    }

    # Pas de cache sur le manifest et le bootstrap Flutter
    location ~* \.(json|html)$ {
        add_header Cache-Control "no-cache";
    }

    # SPA routing : renvoyer index.html pour toutes les routes inconnues
    location / {
        try_files $uri $uri/ /index.html;
    }
}
