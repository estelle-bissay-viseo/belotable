site_name: Belotable - Documentation utilisateur
site_description: Guide utilisateur de l'application Belotable
site_url: https://estelle-bissay-viseo.github.io/belotable/

theme:
  name: material
  language: fr
  features:
    - navigation.sections
    - navigation.top
    - content.code.copy

plugins:
  - search
  - with-pdf:
      enabled_if_env: ENABLE_PDF_EXPORT
      output_path: pdf/belotable-documentation.pdf
      cover_title: Belotable
      cover_subtitle: Documentation utilisateur
      cover_logo: assets/images/logo.png
      author: Belotable Team
      copyright: "2026"
      toc_title: Sommaire

nav:
  - Accueil: index.md
  - Installation: installation.md
  - Utilisation: utilisation.md
  - Annexes: annexes.md

markdown_extensions:
  - admonition
  - toc:
      permalink: true
